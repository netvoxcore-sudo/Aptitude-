<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Aptitude — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0a0a0a;color:#fff;
      font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:24px;text-align:center;
    }
    .logo{
      font-family:'Press Start 2P',monospace;font-size:11px;
      color:#fff;letter-spacing:0.05em;margin-bottom:32px;opacity:0.9;
    }
    .icon{font-size:64px;margin-bottom:24px;opacity:0.6}
    h1{font-size:22px;font-weight:900;margin-bottom:10px}
    p{font-size:14px;color:rgba(255,255,255,0.45);max-width:300px;line-height:1.6;margin-bottom:32px}
    .btn{
      background:#fff;color:#000;border:none;border-radius:14px;
      padding:14px 28px;font-size:14px;font-weight:900;cursor:pointer;
      text-decoration:none;display:inline-block;
    }
    .note{font-size:11px;color:rgba(255,255,255,0.22);margin-top:20px}
  </style>
</head>
<body>
  <div class="logo">APTITUDE</div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No internet connection detected. Your data is safe — reconnect to sync your AI Coach and latest updates.</p>
  <a class="btn" href="/">Try Again</a>
  <p class="note">All your local data is preserved in your device.</p>
</body>
</html>
